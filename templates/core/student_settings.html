{% extends "core/portal_base.html" %}
{% block title %}Settings - LiG Student Portal{% endblock %}
{% block nav_settings %}active{% endblock %}

{% block portal_content %}
<h1>Settings</h1>
<div class="welcome-meta">
  <span>Manage your account settings.</span>
</div>

<section class="admin-capacity" style="margin-top:28px;">
  <h3 style="margin-bottom:16px;">Change Password</h3>
  <form method="post" action="{% url 'student_settings' %}">
    {% csrf_token %}
    <div class="form-row">
      <div class="form-group">
        <label for="current_password">Current Password</label>
        <input type="password" id="current_password" name="current_password" placeholder="Enter current password" required>
      </div>
      <div class="form-group">
        <label for="new_password">New Password</label>
        <input type="password" id="new_password" name="new_password" placeholder="Min. 6 characters" required minlength="6">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label for="confirm_password">Confirm New Password</label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Re-enter new password" required>
      </div>
    </div>
    <button type="submit" class="btn btn-primary">Change Password</button>
  </form>
</section>
{% endblock %}
